services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: closeteye
      POSTGRES_PASSWORD: closeteye
      POSTGRES_DB: closeteye
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend/app:/app/app
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
